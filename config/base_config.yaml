dataset:
  name: ati_dataset
  dataset_root: /home/kimh060612/ati_workspace/realworld_dataset
  min_depth: 1e-3
  max_depth: 10.0
  min_valid_depth_ratio: 0.7
  output_dir: ./da2_ati_cond_uncertainty_ckpt
  num_workers: 16
  train_topologies:
    - "topology1"
    - "topology2"
    - "topology4"
  seen_val_topologies:
    - "topology2"
    - "topology4"
  unseen_val_topologies:
    - "topology3"
    - "topology5"

model:
  model_id: "small"
  image_height: 518
  image_width: 518
  uncertainty_width: 32
  uncertainty_blocks: 3
  uncertainty_dropout: 0.05
  
training:
  batch_size: 16
  num_epochs: 10
  lr_backbone: 1e-6
  lr_uncertainty: 1e-4
  weight_decay: 1e-4
  freeze_backbone: true
  min_log_var: -5.0
  max_log_var: 3.0
  listnet_temperature: 0.1
  list_loss_weight: 0.1
  lambda_smooth_logvar: 1e-3
  grad_clip: 1.0
  relative_align_mode: "scale_shift"
  wandb_entity: artificial_tripartite_intelligence_team
  wandb_project: mde_uncertainty_measure
  wandb_name: dav2_cond_uncertainty
  uncertainty_mode: "mean"
  disable_wandb: false
  no_amp: false
  log_interval: 20
  correlation_max_samples: 100000